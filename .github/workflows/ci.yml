name: ci

on: pull_request

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Install Node dependencies
        run: |
          corepack enable
          yarn install

      - name: Compile Sass (sanity check)
        run: ./node_modules/.bin/sass --no-source-map --load-path=node_modules --load-path=src src/css/App.scss /tmp/app.css

      - name: Lint the source code
        run: yarn run lint

      - name: Run front-end unit tests
        run: yarn run test

      - name: Update Coveralls
        uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install webfonts
        run: |
          ./scripts/fonts.sh

      - name: Start local website server
        run: |
          yarn start &
          sleep 5

      - name: Run browser tests
        run: yarn run cypress run
